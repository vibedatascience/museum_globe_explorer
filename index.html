<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>If Artifacts Went Home — Met Museum Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#F5F0E8;font-family:'DM Sans',sans-serif;overflow:hidden;width:100vw;height:100vh;color:#2A2A2A}
  #cv{position:absolute;inset:0;z-index:1}
  canvas{display:block}
  .hdr{position:absolute;top:20px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none}
  .hdr h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#2A2A2A;letter-spacing:-.3px}
  .hdr .sub{font-size:12px;color:#8A7A6A;margin-top:3px}
  .zc{position:absolute;right:20px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:4px}
  .zb{width:36px;height:36px;border-radius:50%;border:1px solid rgba(180,170,150,.4);background:rgba(245,240,232,.9);backdrop-filter:blur(8px);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2A2A2A;font-weight:300;transition:all .15s}
  .zb:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .df{position:absolute;top:78px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:700px}
  .dc{padding:4px 12px;font-size:11px;font-weight:500;border-radius:14px;border:1.5px solid rgba(180,170,150,.4);background:rgba(245,240,232,.85);backdrop-filter:blur(8px);cursor:pointer;transition:all .15s;color:#8A7A6A;white-space:nowrap}
  .dc:hover{border-color:#8A7A6A}
  .dc.on{font-weight:600;background:var(--cbg);color:var(--cc);border-color:var(--cc)}
  .dc.clr{border-style:dashed;font-size:10px}
  .dc.clr:hover{color:#A42A2A;border-color:#A42A2A}
  .sb{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:20px;align-items:center;z-index:10;background:rgba(245,240,232,.88);backdrop-filter:blur(10px);padding:7px 18px;border-radius:20px;border:1px solid rgba(180,170,150,.3)}
  .sb .st{font-size:12px;color:#8A7A6A}
  .sb .st strong{color:#2A2A2A;font-weight:700}
  .sc{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);width:480px;z-index:10;background:rgba(245,240,232,.88);backdrop-filter:blur(10px);padding:10px 18px;border-radius:14px;border:1px solid rgba(180,170,150,.3)}
  .sl{display:flex;justify-content:space-between;font-size:10px;color:#8A7A6A;margin-bottom:5px;font-weight:500}
  .sl .yd{font-weight:700;color:#2A2A2A;font-size:12px}
  .stk{position:relative;height:34px;cursor:pointer}
  .hc{position:absolute;bottom:6px;left:0;right:0;height:22px;display:flex;align-items:flex-end;gap:1px}
  .hc .bar{flex:1;background:#C4B49A;border-radius:1px 1px 0 0;transition:background .2s}
  .hc .bar.on{background:#8A6A3A}
  .rt{position:absolute;bottom:0;left:0;right:0;height:3px;background:#D4C4A4;border-radius:2px}
  .rf{position:absolute;height:3px;background:#8A6A3A;border-radius:2px;top:0}
  .rh{position:absolute;top:-5px;width:13px;height:13px;border-radius:50%;background:#2A2A2A;border:2px solid #F5F0E8;cursor:grab;transform:translateX(-6.5px);z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .sp{position:absolute;top:0;left:0;width:310px;height:100%;background:rgba(245,240,232,.96);backdrop-filter:blur(20px);z-index:20;border-right:1px solid rgba(180,170,150,.3);overflow-y:auto;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding:18px}
  .sp.open{transform:translateX(0)}
  .sp .cn{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
  .sp .bb{display:inline-block;margin-bottom:6px;font-size:12px;color:#8A7A6A;cursor:pointer;border:none;background:none;font-family:inherit;padding:0}
  .sp .bb:hover{color:#2A2A2A}
  .cs{display:flex;gap:16px;margin-top:8px;margin-bottom:14px}
  .csb{text-align:center;padding:6px 14px;border:1px solid rgba(180,170,150,.3);border-radius:8px;background:rgba(255,255,255,.5)}
  .csb .v{font-size:18px;font-weight:700}
  .csb .l{font-size:9px;color:#8A7A6A;text-transform:uppercase;letter-spacing:.5px}
  .sbi{width:100%;padding:7px 10px;border:1px solid rgba(180,170,150,.4);border-radius:8px;background:rgba(255,255,255,.6);font-family:inherit;font-size:12px;outline:none;margin-bottom:12px}
  .sbi::placeholder{color:#B4A48A}
  .ag{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .ac{border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid rgba(180,170,150,.2);transition:transform .15s,box-shadow .15s;background:#fff}
  .ac:hover{transform:scale(1.03);box-shadow:0 4px 12px rgba(0,0,0,.1)}
  .ac.hl{border:2px solid #8A6A3A;box-shadow:0 0 0 2px rgba(138,106,58,.3);transform:scale(1.03)}
  .ac .th{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden}
  .ac .th img{width:100%;height:100%;object-fit:cover}
  .ac .inf{padding:5px 7px}
  .ac .inf .tt{font-size:9px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ac .inf .dt{font-size:8px;color:#8A7A6A;margin-top:1px}
  .ac .inf .dp{font-size:7px;color:#fff;padding:1px 5px;border-radius:6px;display:inline-block;margin-top:3px}
  .ch{position:absolute;bottom:108px;left:50%;transform:translateX(-50%);font-size:10px;color:#B4A48A;z-index:10;pointer-events:none;transition:opacity .5s}
  .lo{position:fixed;inset:0;background:#F5F0E8;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
  .lo.h{opacity:0;pointer-events:none}
  .lo h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px}
  .lo p{font-size:13px;color:#8A7A6A}
  .ls{width:32px;height:32px;border:3px solid #D4C4A4;border-top-color:#8A6A3A;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:16px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="lo" id="lo"><div class="ls"></div><h2>If Artifacts Went Home</h2><p>Loading world geography...</p></div>
<div id="cv"></div>
<div class="hdr"><h1>If Artifacts Went Home</h1><div class="sub" id="hsub">Loading...</div></div>
<div class="df" id="df"></div>
<div class="zc">
  <button class="zb" id="zi">+</button>
  <button class="zb" id="zo">−</button>
  <button class="zb" id="zr" style="font-size:12px;margin-top:4px">⟳</button>
  <button class="zb" id="tb" style="font-size:10px;margin-top:8px;font-weight:500" title="Toggle country borders">B</button>
</div>
<div class="sc">
  <div class="sl"><span>DATE RANGE</span><span class="yd" id="yd">5000 BCE — 2025 CE</span></div>
  <div class="stk" id="stk">
    <div class="hc" id="hc"></div>
    <div class="rt"><div class="rf" id="rf"></div><div class="rh" id="hs" style="left:0%"></div><div class="rh" id="he" style="left:100%"></div></div>
  </div>
</div>
<div class="sb">
  <div class="st"><strong id="ac">0</strong> artifacts</div>
  <div class="st"><strong id="cc">0</strong> countries</div>
</div>
<div class="ch" id="ch">Drag to rotate · Scroll to zoom · Click a cluster to explore</div>
<div class="sp" id="sp">
  <button class="bb" id="bk">← Back</button>
  <div><div class="cn" id="pcn"></div>
    <div class="cs">
      <div class="csb"><div class="v" id="pac"></div><div class="l">Shown / Total</div></div>
      <div class="csb"><div class="v" id="pdr"></div><div class="l">Date Range</div></div>
    </div>
  </div>
  <input type="text" class="sbi" placeholder="Search artifacts..." id="ps"/>
  <div class="ag" id="pag"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="met_data.js"></script>
<script>
const R=2;
let scene,cam,ren,gG,aG,bG;
let mD=false,lx=0,ly=0,mM=false;
let rY=0.5,rX=0.25,tRY=0.5,tRX=0.25,tZ=5.5;
let aR=true,yS=-5000,yE=2025,aD=new Set(),cTopo=null;

function v3(la,lo,r){const p=(90-la)*Math.PI/180,t=(lo+180)*Math.PI/180;return new THREE.Vector3(-(r*Math.sin(p)*Math.cos(t)),r*Math.cos(p),r*Math.sin(p)*Math.sin(t))}

function rotateTo(la,lo){
  const pos=v3(la,lo,R).normalize();
  tRY=Math.atan2(-pos.x,-pos.z);
  tRX=Math.max(-1.2,Math.min(1.2,Math.asin(pos.y)));
  tZ=4;aR=false;
}

async function init(){
  const el=document.getElementById('cv');
  scene=new THREE.Scene();scene.background=new THREE.Color(0xF5F0E8);
  cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,1000);cam.position.z=5.5;
  ren=new THREE.WebGLRenderer({antialias:true});ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,2));
  el.appendChild(ren.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,.8));
  const dl=new THREE.DirectionalLight(0xffffff,.4);dl.position.set(5,3,5);scene.add(dl);
  gG=new THREE.Group();aG=new THREE.Group();bG=new THREE.Group();bG.visible=false;

  gG.add(new THREE.Mesh(new THREE.SphereGeometry(R,64,64),new THREE.MeshPhongMaterial({color:0xBBCEDB,shininess:5})));


  await loadMap();
  makeArtifacts();
  buildDeptFilter();
  buildHist();
  updSlider();
  scene.add(gG);scene.add(aG);scene.add(bG);
  const _ta=D.reduce((s,c)=>s+c.ct,0);
  document.getElementById('hsub').textContent=_ta.toLocaleString()+' artifacts \u00b7 '+D.length+' countries \u00b7 The Metropolitan Museum of Art';

  ren.domElement.addEventListener('mousedown',e=>{mD=true;mM=false;lx=e.clientX;ly=e.clientY;aR=false;ren.domElement.style.cursor='grabbing'});
  ren.domElement.addEventListener('mousemove',e=>{
    if(!mD){const rc=new THREE.Raycaster();rc.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1),cam);ren.domElement.style.cursor=rc.intersectObjects(aG.children).length?'pointer':'grab';return}
    const dx=e.clientX-lx,dy=e.clientY-ly;if(Math.abs(dx)>2||Math.abs(dy)>2)mM=true;tRY+=dx*.005;tRX=Math.max(-1.2,Math.min(1.2,tRX+dy*.005));lx=e.clientX;ly=e.clientY});
  ren.domElement.addEventListener('mouseup',()=>{mD=false;ren.domElement.style.cursor='grab'});
  ren.domElement.addEventListener('wheel',e=>{tZ=Math.max(2.8,Math.min(10,tZ+e.deltaY*.003))});
  ren.domElement.addEventListener('click',onCl);
  addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});
  document.getElementById('bk').addEventListener('click',()=>document.getElementById('sp').classList.remove('open'));
  document.getElementById('ps').addEventListener('input',e=>{const c=D.find(x=>x.n===document.getElementById('pcn').textContent);if(c)renderP(c,e.target.value)});
  document.getElementById('zi').addEventListener('click',()=>{tZ=Math.max(2.8,tZ-.8)});
  document.getElementById('zo').addEventListener('click',()=>{tZ=Math.min(10,tZ+.8)});
  document.getElementById('zr').addEventListener('click',()=>{tZ=5.5;tRY=0.5;tRX=0.25;aR=true});
  document.getElementById('tb').addEventListener('click',()=>{
    if(!bG.children.length)loadBorders().then(()=>{bG.visible=true;document.getElementById('tb').style.background='#DDD'});
    else{bG.visible=!bG.visible;document.getElementById('tb').style.background=bG.visible?'#DDD':'rgba(245,240,232,.9)'}
  });
  setupSlider();
  document.getElementById('lo').classList.add('h');
  setTimeout(()=>{document.getElementById('ch').style.opacity='0'},5000);
  anim();
}

async function loadMap(){
  const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  cTopo=await r.json();
  const countries=topojson.feature(cTopo,cTopo.objects.countries);
  const cw=2048,ch=1024;
  const cvs=document.createElement('canvas');cvs.width=cw;cvs.height=ch;
  const cx=cvs.getContext('2d');
  cx.fillStyle='#BBCEDB';cx.fillRect(0,0,cw,ch);
  const toX=lo=>(lo+180)/360*cw,toY=la=>(90-la)/180*ch;
  const drawRing=(coords)=>{cx.beginPath();coords.forEach(([lo,la],i)=>{i?cx.lineTo(toX(lo),toY(la)):cx.moveTo(toX(lo),toY(la))});cx.closePath()};
  cx.fillStyle='#EDE6D8';cx.strokeStyle='#C8B898';cx.lineWidth=1;
  countries.features.forEach(f=>{
    const polys=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.coordinates;
    polys.forEach(rings=>{drawRing(rings[0]);cx.fill();cx.stroke()});
  });
  const tex=new THREE.CanvasTexture(cvs);
  gG.children[0].material=new THREE.MeshPhongMaterial({map:tex,shininess:3});
}

async function loadBorders(){
  if(!cTopo){const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');cTopo=await r.json()}
  const borders=topojson.mesh(cTopo,cTopo.objects.countries,(a,b)=>a!==b);
  const bM=new THREE.LineBasicMaterial({color:0x9A8A70,transparent:true,opacity:.3});
  const proc=(coords)=>{
    const pts=coords.map(([lo,la])=>v3(la,lo,R+.005));
    if(pts.length<2)return;
    bG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),bM));
  };
  if(borders.type==='MultiLineString')borders.coordinates.forEach(proc);
  else if(borders.type==='LineString')proc(borders.coordinates);
}

function makeArtifacts(){
  const loader=new THREE.TextureLoader();
  loader.crossOrigin='anonymous';
  D.forEach(c=>{
    const imgs=c.a.filter(a=>a.img);
    if(!imgs.length)return;
    const pos=v3(c.la,c.lo,R+.015);
    const maxT=Math.min(imgs.length,9);
    const gs=Math.ceil(Math.sqrt(maxT));
    const ts=Math.min(.08+Math.log10(Math.max(c.ct,1))*.04,.24);
    const n=pos.clone().normalize();
    const u=new THREE.Vector3(0,1,0);
    const rx=new THREE.Vector3().crossVectors(u,n).normalize();
    const ry=new THREE.Vector3().crossVectors(n,rx).normalize();
    for(let i=0;i<maxT;i++){
      const a=imgs[i];
      const row=Math.floor(i/gs),col=i%gs;
      const sp=ts*.55,ox=(col-(gs-1)/2)*sp,oy=(row-(gs-1)/2)*sp;
      const mat=new THREE.MeshBasicMaterial({side:THREE.DoubleSide,transparent:true,opacity:.92});
      const tile=new THREE.Mesh(new THREE.PlaneGeometry(ts*.48,ts*.48),mat);
      tile.position.copy(pos).add(rx.clone().multiplyScalar(ox)).add(ry.clone().multiplyScalar(oy)).add(n.clone().multiplyScalar(.005*(row+col)));
      tile.lookAt(0,0,0);tile.rotateY(Math.PI);
      tile.userData={country:c.n,date:a.d,dept:a.p,artId:a.id};
      tile.visible=false;
      aG.add(tile);
      const imgUrl=a.img.startsWith('http')?a.img.replace('https://images.metmuseum.org/','/metimg/'):a.img;
      loader.load(imgUrl,tex=>{mat.map=tex;mat.needsUpdate=true;tile.visible=true},undefined,()=>{});
    }
  });
}

function buildDeptFilter(){
  const el=document.getElementById('df');
  Object.entries(DEPTS).forEach(([nm,{color,bg}])=>{
    const ch=document.createElement('div');ch.className='dc';ch.textContent=nm;
    ch.style.setProperty('--cc',color);ch.style.setProperty('--cbg',bg);
    ch.addEventListener('click',()=>{if(aD.has(nm))aD.delete(nm);else aD.add(nm);ch.classList.toggle('on');updSlider()});
    el.appendChild(ch);
  });
  const cl=document.createElement('div');cl.className='dc clr';cl.textContent='✕ Clear';
  cl.addEventListener('click',()=>{aD.clear();el.querySelectorAll('.dc').forEach(c=>c.classList.remove('on'));updSlider()});
  el.appendChild(cl);
}

function buildHist(){
  const el=document.getElementById('hc'),bs=250,bk=[];
  for(let y=-5000;y<2025;y+=bs){let ct=0;D.forEach(c=>c.a.forEach(a=>{if(a.d>=y&&a.d<y+bs)ct++}));bk.push({y,ct})}
  const mx=Math.max(...bk.map(b=>b.ct),1);el.innerHTML='';
  bk.forEach(b=>{const d=document.createElement('div');d.className='bar';d.style.height=Math.max(2,(b.ct/mx)*100)+'%';d.dataset.year=b.y;el.appendChild(d)});
}

function passes(c){
  const tOk=c.dr[0]<=yE&&c.dr[1]>=yS;
  if(!tOk)return false;
  if(aD.size===0)return true;
  return c.a.some(a=>aD.has(a.p));
}

function updSlider(){
  const pS=((yS+5000)/7025)*100,pE=((yE+5000)/7025)*100;
  document.getElementById('hs').style.left=pS+'%';
  document.getElementById('he').style.left=pE+'%';
  document.getElementById('rf').style.left=pS+'%';
  document.getElementById('rf').style.width=(pE-pS)+'%';
  const f=y=>y<0?`${Math.abs(y)} BCE`:`${y} CE`;
  document.getElementById('yd').textContent=`${f(yS)} — ${f(yE)}`;
  document.querySelectorAll('.hc .bar').forEach(b=>{b.classList.toggle('on',parseInt(b.dataset.year)>=yS&&parseInt(b.dataset.year)<=yE)});
  updVis();
  if(document.getElementById('sp').classList.contains('open')){
    const c=D.find(x=>x.n===document.getElementById('pcn').textContent);
    if(c)renderP(c,document.getElementById('ps').value);
  }
}

function updVis(){
  let tot=0;const vis=new Set();
  D.forEach(c=>{if(passes(c)){
    let ct=c.ct;
    if(aD.size>0){const r=c.a.filter(a=>aD.has(a.p)).length/c.a.length;ct=Math.round(c.ct*r)}
    tot+=ct;vis.add(c.n);
  }});
  aG.children.forEach(t=>{
    const ud=t.userData;
    if(!vis.has(ud.country)){t.material.opacity=.04;return}
    const dateOk=ud.date>=yS&&ud.date<=yE;
    const deptOk=aD.size===0||aD.has(ud.dept);
    t.material.opacity=(dateOk&&deptOk)?.92:.04;
  });
  document.getElementById('ac').textContent=(tot||D.reduce((s,c)=>s+c.ct,0)).toLocaleString();
  document.getElementById('cc').textContent=vis.size||D.length;
}

function setupSlider(){
  const tr=document.getElementById('stk'),hS=document.getElementById('hs'),hE=document.getElementById('he');
  let act=null;
  const gy=e=>{const r=tr.getBoundingClientRect();return Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*7025-5000)};
  hS.addEventListener('mousedown',e=>{e.stopPropagation();act='s'});
  hE.addEventListener('mousedown',e=>{e.stopPropagation();act='e'});
  addEventListener('mousemove',e=>{if(!act)return;const y=gy(e);if(act==='s')yS=Math.min(y,yE-100);else yE=Math.max(y,yS+100);updSlider()});
  addEventListener('mouseup',()=>{act=null});
  tr.addEventListener('click',e=>{const y=gy(e);if(Math.abs(y-yS)<Math.abs(y-yE))yS=Math.min(y,yE-100);else yE=Math.max(y,yS+100);updSlider()});
}

function onCl(e){
  if(mM)return;
  const rc=new THREE.Raycaster();
  rc.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1),cam);
  const h=rc.intersectObjects(aG.children);
  if(h.length){
    const ud=h[0].object.userData;
    const c=D.find(x=>x.n===ud.country);
    if(c)openP(c,ud.artId);
  }
}

function openP(c,artId){
  document.getElementById('pcn').textContent=c.n;
  document.getElementById('pac').innerHTML=c.a.length+'<span style="font-size:10px;color:#8A7A6A;font-weight:400"> / '+c.ct.toLocaleString()+'</span>';
  const f=y=>y<0?`${Math.abs(y)}BC`:`${y}`;
  document.getElementById('pdr').textContent=`${f(c.dr[0])}–${f(c.dr[1])}`;
  document.getElementById('ps').value='';
  renderP(c,'',artId);
  document.getElementById('sp').classList.add('open');
}

function renderP(c,s,hlId){
  const g=document.getElementById('pag');
  let arts=c.a.filter(a=>!s||a.t.toLowerCase().includes(s.toLowerCase()));
  if(aD.size>0)arts=arts.filter(a=>aD.has(a.p));
  arts=arts.filter(a=>a.d>=yS&&a.d<=yE);
  g.innerHTML=arts.map(a=>{
    const dc=DEPTS[a.p]||{color:'#758D99'};
    const link=a.id?`https://www.metmuseum.org/art/collection/search/${a.id}`:'';
    const open=link?` onclick="window.open('${link}','_blank')" title="View on metmuseum.org"`:'';
    const hl=a.id&&a.id===hlId?' hl':'';
    const thumb=a.img
      ?`<div class="th" style="background:#f0ebe3"><img src="${a.img}" style="width:100%;height:100%;object-fit:cover" loading="lazy" onerror="this.parentNode.innerHTML='${a.e}';this.parentNode.style.background='linear-gradient(135deg,${a.c},${a.c}CC)'"></div>`
      :`<div class="th" style="background:linear-gradient(135deg,${a.c},${a.c}CC)">${a.e}</div>`;
    return `<div class="ac${hl}" data-id="${a.id}"${open}>${thumb}
    <div class="inf"><div class="tt">${a.t}</div><div class="dt">${a.d<0?Math.abs(a.d)+' BCE':a.d+' CE'}</div>
    <span class="dp" style="background:${dc.color}">${a.p}</span></div></div>`}).join('');
  if(hlId){const el=g.querySelector('[data-id="'+hlId+'"]');if(el)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),100)}
}

function anim(){
  requestAnimationFrame(anim);
  if(aR)tRY+=.0008;
  rY+=(tRY-rY)*.06;rX+=(tRX-rX)*.06;
  cam.position.z+=(tZ-cam.position.z)*.06;
  [gG,aG,bG].forEach(g=>{g.rotation.y=rY;g.rotation.x=rX});
  ren.render(scene,cam);
}

addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
